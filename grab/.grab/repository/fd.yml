apiVersion: grab.noizwaves.com/v1alpha1
kind: Package
metadata:
  name: fd
spec:
  gitHubRelease:
    org: sharkdp
    repo: fd
    name: v{{ .Version }}
    versionRegex: \d+\.\d+\.\d+
    fileName:
      darwin,arm64: fd-v{{ .Version }}-aarch64-apple-darwin.tar.gz
      linux,amd64: fd-v{{ .Version }}-x86_64-unknown-linux-gnu.tar.gz
      linux,arm64: fd-v{{ .Version }}-aarch64-unknown-linux-gnu.tar.gz
    embeddedBinaryPath:
      darwin,arm64: "fd-v{{ .Version }}-aarch64-apple-darwin/fd"
      linux,amd64: "fd-v{{ .Version }}-x86_64-unknown-linux-gnu/fd"
      linux,arm64: "fd-v{{ .Version }}-aarch64-unknown-linux-gnu/fd"
  program:
    versionArgs: [--version]
    versionRegex: \d+\.\d+\.\d+
